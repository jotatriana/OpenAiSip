<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Bridge — Operator Dashboard</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=2">
  <link rel="stylesheet" href="/static/css/dashboard.css?v=2">
</head>
<body>

<header class="header">
  <span class="header__title">Voice Bridge &mdash; Operator Dashboard</span>
  <div class="header__right">
    <span id="conn-badge" class="conn-badge conn-badge--disconnected">
      <span class="conn-badge__dot"></span>Disconnected
    </span>
    <button id="theme-toggle" class="theme-toggle">☾ Dark</button>
  </div>
</header>

<div id="auth-banner" class="auth-banner">
  Dashboard authentication failed. <a href="#" onclick="clearApiKey()">Re-enter API key</a>
</div>

<!-- Login overlay -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <h2 class="login-box__title">Operator Dashboard</h2>
    <p class="login-box__sub">Enter your Dashboard API key to continue</p>
    <form id="login-form" class="login-form">
      <input id="login-key-input" class="login-input" type="password"
             placeholder="API key" autocomplete="current-password" />
      <button class="login-btn" type="submit">Connect</button>
    </form>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<main class="main">

  <!-- Channel Health -->
  <div class="card">
    <div class="card__header">
      <span class="card__title">Channel Health</span>
    </div>
    <div class="card__body" id="health-body">
      <p class="empty">Waiting for data…</p>
    </div>
  </div>

  <!-- Token Usage -->
  <div class="card">
    <div class="card__header">
      <span class="card__title">Token Usage</span>
    </div>
    <div class="card__body" id="tokens-body">
      <p class="empty">No calls yet</p>
    </div>
  </div>

  <!-- Active Calls -->
  <div class="card" style="grid-column: 1 / -1">
    <div class="card__header">
      <span class="card__title">Active Calls</span>
    </div>
    <div class="card__body" style="padding:0">
      <table class="calls-table">
        <thead>
          <tr>
            <th>Call ID</th>
            <th>From</th>
            <th>State</th>
            <th>Phase</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="calls-tbody">
          <tr><td colspan="5" class="empty">No calls</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Live Logs -->
  <div class="card logs-panel">
    <div class="card__header">
      <span class="card__title">Live Logs</span>
      <div class="logs-controls">
        <label for="log-level-filter" style="font-size:0.75rem;color:var(--text-secondary)">Min level:</label>
        <select id="log-level-filter">
          <option value="DEBUG">DEBUG</option>
          <option value="INFO" selected>INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
        </select>
      </div>
    </div>
    <div class="card__body" style="padding:0.5rem">
      <div id="log-stream" class="log-stream"></div>
    </div>
  </div>

</main>

<script src="/static/js/ws-client.js?v=2"></script>
<script src="/static/js/calls-panel.js?v=2"></script>
<script src="/static/js/tokens-panel.js?v=2"></script>
<script src="/static/js/health-panel.js?v=2"></script>
<script src="/static/js/logs-panel.js?v=2"></script>
<script src="/static/js/dashboard.js?v=2"></script>

</body>
</html>
